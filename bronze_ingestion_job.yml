resources:
  jobs:
    BronzeIngestion:
      name: BronzeIngestion
      tasks:
        - task_key: parameters
          notebook_task:
            notebook_path: "source parameters"
        - task_key: IncrementalIngestion
          depends_on:
            - task_key: parameters
          for_each_task:
            inputs: "{{tasks.parameters.values.output_key}}"
            task:
              task_key: IncrementalIngestion_iteration
              notebook_task:
                notebook_path: "BronzeLayer"
                base_parameters:
                  src: "{{input.src}}"
      git_source:
        git_url: https://github.com/YashvardhanRaj/Databricks-end-to-end-project.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
